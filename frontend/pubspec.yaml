name: golden_chicken
description: "Golden Chicken — AI-first poultry farm assistant for Bangladesh"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  camera: ^0.11.1
  connectivity_plus: ^6.1.4
  dartz: ^0.10.1
  dio: ^5.8.0+1
  equatable: ^2.0.7
  fl_chart: ^0.70.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.1.0
  get_it: ^8.0.3
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  just_audio: ^0.9.42
  logger: ^2.5.0
  permission_handler: ^11.4.0
  record: ^6.2.0
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  web_socket_channel: ^3.0.2

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/plus_jakarta_sans/PlusJakartaSans-Bold.ttf
          weight: 700
    - family: HindSiliguri
      fonts:
        - asset: assets/fonts/hind_siliguri/HindSiliguri-Regular.ttf
          weight: 400
        - asset: assets/fonts/hind_siliguri/HindSiliguri-Medium.ttf
          weight: 500
        - asset: assets/fonts/hind_siliguri/HindSiliguri-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/hind_siliguri/HindSiliguri-Bold.ttf
          weight: 700

